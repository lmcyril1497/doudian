<meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="抖店注册"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no">
<title>抖店</title>


<style>
/* ============================================================
   APPLE-STYLE DESIGN SYSTEM — 抖店注册追踪
   ============================================================ */
:root {
  /* ── Apple System Colors ── */
  --blue: #0071E3;
  --blue-hover: #0077ED;
  --blue-light: rgba(0,113,227,0.10);
  --blue-pressed: rgba(0,113,227,0.18);
  --green: #34C759;
  --green-hover: #30B350;
  --green-light: rgba(52,199,89,0.10);
  --orange: #FF9500;
  --orange-hover: #F08800;
  --orange-light: rgba(255,149,0,0.10);
  --red: #FF3B30;
  --red-hover: #E0352B;
  --red-light: rgba(255,59,48,0.10);
  --purple: #AF52DE;
  --purple-light: rgba(175,82,222,0.10);

  /* ── Apple Text Colors (opacity-based) ── */
  --text-primary: rgba(0,0,0,0.85);
  --text-secondary: rgba(0,0,0,0.55);
  --text-tertiary: rgba(0,0,0,0.28);
  --text-quaternary: rgba(0,0,0,0.15);

  /* ── Apple Fill Colors ── */
  --fill-primary: rgba(0,0,0,0.06);
  --fill-secondary: rgba(0,0,0,0.04);
  --fill-tertiary: rgba(0,0,0,0.02);

  /* ── Apple Materials (glass levels) ── */
  --material-ultrathin: rgba(245,245,247,0.36);
  --material-thin: rgba(245,245,247,0.48);
  --material-medium: rgba(245,245,247,0.64);
  --material-thick: rgba(245,245,247,0.76);
  --material-ultrathick: rgba(245,245,247,0.88);

  /* ── Surfaces ── */
  --surface-root: #F5F5F7;
  --surface-card: #FFFFFF;
  --surface-column: rgba(250,250,250,0.70);

  /* ── Borders ── */
  --border-subtle: rgba(0,0,0,0.05);
  --border-default: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.12);

  /* ── Radius ── */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 22px;
  --radius-pill: 980px;

  /* ── Shadows ── */
  --shadow-card: 0 1px 3px rgba(0,0,0,0.03), 0 0 0 1px rgba(0,0,0,0.04);
  --shadow-card-hover: 0 8px 32px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.06);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.16), 0 0 0 1px rgba(0,0,0,0.06);
  --shadow-toast: 0 8px 32px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.05);

  /* ── Layout ── */
  --header-height: 52px;
  --content-gap: 20px;
  --page-padding: 40px;
  --touch-target: 44px;
  --btn-height: 34px;

  /* ── Apple Spring Curves ── */
  --ease-apple: cubic-bezier(0.25, 0.1, 0.25, 1);
  --spring-smooth: cubic-bezier(0.22, 0.61, 0.36, 1);
  --spring-bouncy: cubic-bezier(0.16, 1.02, 0.44, 1.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
    "Helvetica Neue", "PingFang SC", "Noto Sans SC", sans-serif;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
}

body {
  min-height: 100vh;
  background: var(--surface-root);
  overflow: hidden;
  color: var(--text-primary);
  user-select: none;
  -webkit-user-select: none;
}

/* ── Loading Screen ── */
.loading-screen {
  position: fixed; inset: 0; z-index: 10000;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.35s ease;
  pointer-events: all;
}
.loading-screen--hide { opacity: 0; pointer-events: none; }
.ls-mascot {
  position: absolute; bottom: 30px; left: 50px;
  width: 30px; height: 30px;
  animation: ls-bounce 0.5s ease-in-out infinite alternate;
}
.ls-logo {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 16px; font-weight: 700;
  box-shadow: 0 2px 8px rgba(102,126,234,.3);
}
@keyframes ls-bounce {
  0%  { transform: scaleY(.7); }
  40% { transform: scale(.8, 1.2); }
  60% { transform: scale(1); }
  to  { bottom: 100px; }
}
.ls-bar {
  position: absolute; right: 0; top: 0;
  height: 5px; width: 40px; border-radius: 2px;
  box-shadow: 0 1px 2px rgba(0,0,0,.05);
  animation: ls-step 1s ease-in-out infinite;
}
@keyframes ls-step {
  0% { box-shadow: 0 10px 0 transparent, 0 10px 0 #f2f2f2, -35px 50px 0 #f2f2f2, -70px 90px 0 #f2f2f2; }
  to { box-shadow: 0 10px 0 #f2f2f2, -35px 50px 0 #f2f2f2, -70px 90px 0 #f2f2f2, -70px 90px 0 transparent; }
}
.ls-text { font-size: 13px; color: var(--text-tertiary); }

/* ── Login Wall ── */
.login-wall { position:fixed; inset:0; z-index:9999; background:linear-gradient(160deg,#f0f0f5,#e8e8f0); display:flex; align-items:center; justify-content:center; padding:20px; }
.lw-card { width:360px; max-width:100%; background:#fff; border-radius:18px; box-shadow:0 4px 24px rgba(0,0,0,.08); padding:28px 32px 24px; display:flex; flex-direction:column; }
.lw-header { text-align:center; margin-bottom:24px; }
.lw-title { font-size:20px; font-weight:500; color:#1d1d1f; }
.lw-desc { font-size:13px; color:#71717a; margin-top:6px; }
.lw-fields { display:flex; flex-direction:column; gap:14px; }
.lw-field input { width:100%; height:48px; padding:0 14px; border:2px solid #e4e4e7; border-radius:10px; font-size:15px; font-family:inherit; color:#1d1d1f; outline:none; transition:border-color .15s; }
.lw-field input:focus { border-color:#667eea; }
.lw-field input::placeholder { color:#a1a1aa; }
.lw-btn { height:40px; border:none; border-radius:10px; background:#667eea; color:#fff; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
.lw-btn:hover { background:#5a6fd6; }
.lw-forgot { text-align:right; margin:8px 0 16px; }
.lw-forgot a { font-size:13px; color:#71717a; cursor:pointer; }
.lw-divider { display:flex; align-items:center; gap:12px; margin:16px 0; color:#a1a1aa; font-size:12px; }
.lw-divider:before,.lw-divider:after { content:''; flex:1; height:1px; background:#e4e4e7; }
.lw-register { text-align:center; font-size:13px; color:#71717a; }
.lw-register a { color:#667eea; cursor:pointer; }
.lw-hint { font-size:13px; color:#ff3b30; min-height:18px; margin-top:12px; text-align:center; }
.um-item { display:flex; align-items:center; width:100%; padding:8px 12px; border:none; border-radius:8px; background:none; font-size:13px; font-family:inherit; color:#1d1d1f; cursor:pointer; text-align:left; }
.um-item:hover { background:rgba(0,0,0,.04); }
.um-item--danger { color:#ff3b30; }
.um-item--danger:hover { background:rgba(255,59,48,.08); }

/* ── App Shell ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Header (Apple navigation glass) ── */
.header {
  position: sticky; top: 0; z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--header-height);
  padding: 0 var(--page-padding);
  gap: 16px;
  flex-shrink: 0;
  background: var(--material-ultrathick);
  backdrop-filter: blur(60px) saturate(240%);
  -webkit-backdrop-filter: blur(60px) saturate(240%);
  border-bottom: 1px solid var(--border-subtle);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 16px; font-weight: 700;
  box-shadow: 0 2px 8px rgba(102,126,234,.3);
}
.header-title {
  font-size: 17px; font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}
.header-right { display: flex; align-items: center; gap: 10px; }

/* ── Search ── */
.search-wrap { position: relative; }
.search-input {
  width: 200px; height: 32px;
  padding: 0 12px 0 32px;
  background: rgba(0,0,0,.04);
  border: none;
  border-radius: 8px;
  font-size: 13px; font-family: inherit;
  color: var(--text-primary);
  outline: none;
  transition: background .15s;
}
.search-input::placeholder { color: var(--text-tertiary); }
.search-input:focus {
  background: rgba(0,0,0,.06);
}
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-tertiary); font-size: 14px; pointer-events: none;
  transition: color 0.2s var(--ease-apple);
}
.btn--search-toggle { display: none !important; }

@media (max-width: 768px) {
  .btn--search-toggle { display: inline-flex !important; }
  .search-wrap { display: none; }
  .search-wrap.search--open {
    display: flex; position: absolute; top: 100%; left: 0; right: 0;
    padding: 10px 12px; background: var(--material-ultrathick);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border-bottom: 1px solid var(--border-subtle); z-index: 30;
    animation: fade-in 0.2s var(--ease-apple);
  }
  .search-wrap.search--open .search-input {
    width: 100%; height: 38px; border-radius: 10px;
    font-size: 16px; padding: 0 14px 0 36px;
  }
  .search-wrap.search--open .search-icon {
    left: 22px; font-size: 16px;
  }
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: var(--btn-height);
  padding: 0 18px;
  border: none; border-radius: var(--radius-pill);
  font-size: 14px; font-weight: 520; font-family: inherit;
  cursor: pointer;
  transition: box-shadow 0.25s var(--ease-apple), transform 0.25s var(--ease-apple), background 0.25s var(--ease-apple), border-color 0.25s var(--ease-apple), color 0.25s var(--ease-apple), opacity 0.25s var(--ease-apple);
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn--primary {
  background: var(--blue); color: #fff;
}
.btn--primary:hover { background: var(--blue-hover); }
.btn--ghost {
  background: var(--fill-primary);
  color: var(--text-primary);
}
.btn--ghost:hover { background: var(--fill-primary); filter: brightness(0.92); }
.btn--icon {
  width: var(--btn-height); padding: 0; justify-content: center;
  border-radius: 50%;
  background: transparent;
  color: var(--text-secondary);
}
.btn--icon:hover { background: var(--fill-primary); color: var(--text-primary); }
.btn svg { width: 16px; height: 16px; flex-shrink: 0; }

/* ── Stats Strip ── */
.stats-strip {
  display: flex; gap: 8px;
  padding: 12px var(--page-padding) 14px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.stats-strip::-webkit-scrollbar { display: none; }
.stat-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 18px;
  background: var(--surface-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 540;
  color: var(--text-secondary);
  white-space: nowrap;
  flex-shrink: 0;
  transition: box-shadow 0.25s var(--ease-apple), transform 0.25s var(--ease-apple), background 0.25s var(--ease-apple), border-color 0.25s var(--ease-apple), color 0.25s var(--ease-apple), opacity 0.25s var(--ease-apple);
  cursor: pointer;
  min-height: var(--touch-target);
}
.stat-pill:hover { background: #fff; border-color: var(--border-default); color: var(--text-primary); }
.stat-pill--active {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
.stat-pill--active:hover { background: var(--blue-hover); border-color: var(--blue-hover); color: #fff; }
.stat-pill--active .stat-count { color: rgba(255,255,255,0.76); }
.stat-pill--active .stat-dot { box-shadow: 0 0 0 2px rgba(255,255,255,0.25); }
.stat-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.stat-count {
  font-size: 16px; font-weight: 620; letter-spacing: -0.02em;
  min-width: 18px; text-align: center;
}

/* ── Kanban Board ── */
.kanban {
  flex: 1;
  display: flex; gap: var(--content-gap);
  padding: 0 var(--page-padding) 20px;
  contain: layout style paint;
  overflow: hidden;
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.08) transparent;
}
.kanban::-webkit-scrollbar { height: 5px; }
.kanban::-webkit-scrollbar-track { background: transparent; }
.kanban::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.08);
  border-radius: 3px;
}
.kanban::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.15); }

/* ── Column ── */
.column {
  flex: 1; min-width: 200px; max-width: 100%;
  display: flex; flex-direction: column;
  background: var(--surface-column);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  transition: box-shadow 0.3s var(--ease-apple), transform 0.3s var(--ease-apple);
  overflow: hidden;
}
.column--drag-over {
  background: rgba(0,113,227,0.03);
  border-color: rgba(0,113,227,0.18);
  box-shadow: 0 0 0 3px rgba(0,113,227,0.06);
}
.column-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px;
  flex-shrink: 0;
}
.column-header-left { display: flex; align-items: center; gap: 8px; }
.column-icon {
  width: 30px; height: 30px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.column-icon svg, .column-icon i {
  width: 18px; height: 18px;
}
.column-icon i {
  display: inline-block;
  width: 18px; height: 18px;
}
.column-title {
  font-size: 13px; font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}
.column-count {
  font-size: 12px; font-weight: 560;
  padding: 2px 8px; border-radius: var(--radius-pill);
  background: var(--fill-primary);
  color: var(--text-secondary);
}
.column-cards {
  flex: 1;
  overflow-y: auto;
  padding: 6px 16px 20px;
  display: flex; flex-direction: column; gap: 12px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.column-cards::-webkit-scrollbar { display: none; }
.column-drop-hint {
  text-align: center; padding: 28px 8px;
  color: var(--text-tertiary); font-size: 12px; font-weight: 500;
  border: 2px dashed rgba(0,0,0,0.05);
  border-radius: var(--radius-md);
  margin: 4px 0;
  transition: box-shadow 0.25s var(--ease-apple), transform 0.25s var(--ease-apple), background 0.25s var(--ease-apple), border-color 0.25s var(--ease-apple), color 0.25s var(--ease-apple), opacity 0.25s var(--ease-apple);
}
.column--drag-over .column-drop-hint {
  border-color: rgba(0,113,227,0.18);
  color: var(--blue);
  background: rgba(0,113,227,0.02);
}

/* ── Client Card ── */
.card {
  background: var(--surface-card);
  border-radius: var(--radius-lg);
  padding: 18px;
  cursor: pointer;
  box-shadow: var(--shadow-card);
  transition: box-shadow 0.3s var(--ease-apple), transform 0.3s var(--ease-apple);
  position: relative;
}
.card:hover {
  box-shadow: var(--shadow-card-hover);
  transform: translateY(-1px);
}
.card:active { cursor: grabbing; transform: scale(0.985); }
.card--dragging {
  opacity: 0.35;
  box-shadow: none;
  border-color: transparent;
}
.card--highlight { box-shadow: 0 0 0 3px rgba(0,113,227,0.16); }

/* ── Custom Drag Image — physically clipped rounded shape ── */
.drag-ghost {
  position: fixed; top: -9999px; left: -9999px;
  background: rgba(255,255,255,0.86);
  backdrop-filter: blur(40px) saturate(240%);
  -webkit-backdrop-filter: blur(40px) saturate(240%);
  border-radius: 24px;
  /* Physically clip to rounded rect — no rectangular edges */
  clip-path: inset(0 round 24px);
  -webkit-clip-path: inset(0 round 24px);
  /* Use drop-shadow filter instead of box-shadow — follows clip-path shape */
  filter: drop-shadow(0 16px 40px rgba(0,0,0,0.15)) drop-shadow(0 2px 8px rgba(0,0,0,0.06));
  -webkit-filter: drop-shadow(0 16px 40px rgba(0,0,0,0.15)) drop-shadow(0 2px 8px rgba(0,0,0,0.06));
  padding: 14px 16px;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
  pointer-events: none;
  z-index: 9999;
  min-width: 180px;
  max-width: 260px;
}
.drag-ghost .dg-name {
  font-size: 15px; font-weight: 620;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.drag-ghost .dg-tags {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-bottom: 6px;
}
.drag-ghost .dg-tag {
  font-size: 10px; font-weight: 550;
  padding: 3px 8px;
  border-radius: 5px;
  display: inline-flex; align-items: center; gap: 2px;
  line-height: 1.3;
}
.drag-ghost .dg-tag--green { background: rgba(52,199,89,0.08); color: #1D7A35; }
.drag-ghost .dg-tag--blue  { background: rgba(0,113,227,0.08); color: #005BB5; }
.drag-ghost .dg-tag--orange { background: rgba(255,149,0,0.08); color: #B06500; }
.drag-ghost .dg-copybar {
  padding: 7px 10px; margin: 6px 0 4px;
  background: rgba(52,199,89,0.05);
  border: 1px solid rgba(52,199,89,0.12);
  border-radius: 8px;
  font-size: 11px; font-weight: 540;
  color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.drag-ghost .dg-time {
  font-size: 10px; color: var(--text-tertiary);
  margin-top: 4px;
}

.card-name {
  font-size: 15px; font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.card-phone {
  font-size: 12px; font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.card-tag {
  font-size: 11px; font-weight: 540;
  padding: 3px 8px;
  border-radius: 6px;
  display: inline-flex; align-items: center; gap: 3px;
  line-height: 1;
  vertical-align: middle;
  white-space: nowrap;
}
.card-tag svg { flex-shrink: 0; width: 10px !important; height: 10px !important; }
.card-tag--bank { background: rgba(52,199,89,0.08); color: #1D7A35; }
.card-tag--id   { background: rgba(0,113,227,0.08); color: #005BB5; }
.card-tag--note { background: rgba(255,149,0,0.08); color: #B06500; }

.card-meta {
  display: flex; flex-direction: row; flex-wrap: wrap; gap: 5px;
  margin-bottom: 10px;
  align-items: center;
}

.card-actions {
  position: absolute; top: 10px; right: 10px;
  display: flex; gap: 4px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s var(--ease-apple);
}
.card:hover .card-actions {
  opacity: 1;
  pointer-events: auto;
}

.card-action {
  height: 28px; width: 28px;
  display: flex; align-items: center; justify-content: center;
  border: none; border-radius: 50%;
  font-size: 13px; font-weight: 540; font-family: inherit;
  cursor: pointer;
  transition: box-shadow 0.25s var(--ease-apple), transform 0.25s var(--ease-apple), background 0.25s var(--ease-apple), border-color 0.25s var(--ease-apple), color 0.25s var(--ease-apple), opacity 0.25s var(--ease-apple);
  color: var(--text-secondary);
  background: var(--fill-primary);
  flex-shrink: 0;
}
.card-action:hover { background: rgba(0,0,0,0.10); color: var(--text-primary); }
.card-action--next { color: var(--blue); }
.card-action--next:hover { background: var(--blue-light); color: var(--blue); }
.card-action--delete { color: var(--red); }
.card-action--delete:hover { background: var(--red-light); color: var(--red-hover); }

.card-time {
  font-size: 11px; color: var(--text-tertiary); font-weight: 500;
  margin-top: 8px;
}

function sbHead() { return { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' }; }
function hashPassword(phone, password) {
  var rounds = 3, hash = phone + ':' + password + ':xt_doudian_2024';
  for (var i = 0; i < rounds; i++) { hash = btoa(hash); }
  return Promise.resolve(hash);
}
async function sbFetch(table, method, body) {
  var url = SB_URL + '/rest/v1/' + table;
  if (method === 'GET') { url += '?user_id=eq.' + encodeURIComponent(currentUser) + '&order=createdAt'; }
  var opts = { method: method, headers: sbHead() };
  if (body) { opts.body = JSON.stringify(body); opts.headers['Prefer'] = 'resolution=merge-duplicates'; }
  try {
    var r = await fetch(url, opts);
    if (!r.ok) {
      var err = await r.text();
      console.log('Supabase error: ' + r.status + ' ' + err);
      toast('同步失败: ' + r.status + ' ' + err.slice(0,50), 'error');
    }
    return r.ok ? (method === 'GET' ? r.json() : true) : (method === 'GET' ? [] : false);
  } catch(e) {
    console.log('Supabase fetch error: ' + e.message);
    toast('网络错误: ' + e.message, 'error');
    return method === 'GET' ? [] : false;
  }
}

  } catch(e) { document.getElementById("lw_hint").textContent = "登录失败: " + (e.message||"网络错误"); }
}

function genId() {
  return 'c_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  const m = d.getMonth() + 1;
  const day = d.getDate();
  return `${m}/${day} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// Convert "M.D" string → timestamp (midnight of that date in current year)
function parseReviewDate(str) {
  if (!str) return 0;
  var parts = str.split('.');
  var m = parseInt(parts[0]); var d = parseInt(parts[1]);
  if (isNaN(m) || isNaN(d) || m < 1 || m > 12 || d < 1 || d > 31) return 0;
  var now = new Date();
  return new Date(now.getFullYear(), m - 1, d).getTime();
}
// Convert timestamp → "M.D" string
function formatReviewDate(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  return `${d.getMonth()+1}.${d.getDate()}`;
}

// Desktop date picker popup
function dpToggle(btn) {
  var existing = document.querySelector('.dp-popup');
  // Close custom select popups first
  var cs = document.querySelector('.cs-dropdown'); if(cs){ if(cs._handler) document.removeEventListener('mousedown',cs._handler,true); cs.remove(); }
  // Toggle: if already open, close it
  if (existing) { if (existing._btn === btn) { if(existing._handler) document.removeEventListener('mousedown',existing._handler,true); existing.remove(); return; } if(existing._handler) document.removeEventListener('mousedown',existing._handler,true); existing.remove(); }

  var type = btn.getAttribute('data-dp');
  var pop = document.createElement('div');
  pop.className = 'dp-popup';
  pop._btn = btn;
  var btnRect = btn.getBoundingClientRect();
  var spaceBelow = window.innerHeight - btnRect.bottom;
  pop.style.cssText = 'position:fixed;z-index:99999;background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.04);padding:4px;max-height:200px;overflow-y:auto;min-width:80px;';
  if (spaceBelow > 240) { pop.style.top = btnRect.bottom + 4 + 'px'; }
  else { pop.style.bottom = (window.innerHeight - btnRect.top) + 4 + 'px'; }
  pop.style.left = btnRect.left + 'px';
  pop.style.width = btnRect.width + 'px';

  var count = type === 'month' ? 12 : 31;
  var suffix = type === 'month' ? '月' : '日';
  var curVal = document.getElementById('mf_review' + (type==='month'?'Month':'Day') + 'Val').value;

  for (var i = 1; i <= count; i++) {
    var opt = document.createElement('button');
    opt.type = 'button';
    opt.className = 'dp-opt' + (String(i) === curVal ? ' dp-opt--sel' : '');
    opt.textContent = i;
    opt.onclick = function(v) { return function() {
      document.getElementById('mf_review' + (type==='month'?'Month':'Day') + 'Val').value = v;
      // Also sync mobile select
      var mobSel = document.getElementById('mf_review' + (type==='month'?'Month':'Day'));
      if (mobSel) mobSel.value = v;
      btn.textContent = v + suffix;
      if(pop._handler) document.removeEventListener('mousedown',pop._handler,true); pop.remove();
    }; }(i);
    pop.appendChild(opt);
  }
  document.body.appendChild(pop);

  // Scroll to selected
  var sel = pop.querySelector('.dp-opt--sel');
  if (sel) { pop.scrollTop = sel.offsetTop - pop.clientHeight / 2 + sel.clientHeight / 2; }

  // Close on outside mousedown (capture phase)
  setTimeout(function() {
    pop._handler = function(e) {
      if (!pop.contains(e.target) && !btn.contains(e.target)) { pop.remove(); document.removeEventListener('mousedown', pop._handler, true); }
    };
    document.addEventListener('mousedown', pop._handler, true);
  }, 10);
}

function moveClient(clientId, toStage) {
  const client = clients.find(c => c.id === clientId);
  if (!client) return;
  if (client.stage === toStage) return;
  var fromStage = client.stage;
  const fromLabel = STAGES[fromStage]?.label || '';
  const toLabel = STAGES[toStage]?.label || '';
  client.stage = toStage;
  if (!client.stageTimestamps) client.stageTimestamps = {};
  client.stageTimestamps[toStage] = Date.now();
  saveClients(clients);
  refreshAll([fromStage, toStage]);
}

function deleteClient(clientId) {
  const client = clients.find(c => c.id === clientId);
  if (!client) return;
  clients = clients.filter(c => c.id !== clientId);
  saveClients(clients);
  // Also delete from cloud
  if (currentUser) { fetch(SB_URL + "/rest/v1/clients?id=eq." + encodeURIComponent(clientId), { method: "DELETE", headers: sbHead() }).catch(function(e) { console.log("Delete from cloud failed:",e.message); clients.push(client); saveClients(clients); toast("删除同步失败，数据已恢复","error"); }); }
  const trash = loadTrash();
  trash.push(Object.assign({}, client, { deletedAt: Date.now() }));
  saveTrash(trash);
  refreshAll();
  toast("已删除: " + client.name, "warning", "restoreFromTrash('" + clientId + "',true)");
}

// ============================================================
// COPY TEXT — robust across http/https & mobile
// ============================================================
function copyToClipboard(text, successMsg) {
  // Try modern Clipboard API first
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(function() {
      toast(successMsg, 'success');
    }).catch(function() {
      fallbackCopy(text, successMsg);
    });
    return;
  }
  fallbackCopy(text, successMsg);
}

function fallbackCopy(text, successMsg) {
  var ta = document.createElement('textarea');
  ta.value = text;
  // Position on-screen (critical for mobile Safari)
  ta.style.position = 'fixed';
  ta.style.top = '0';
  ta.style.left = '0';
  ta.style.width = '2px';
  ta.style.height = '2px';
  ta.style.padding = '0';
  ta.style.border = 'none';
  ta.style.outline = 'none';
  ta.style.boxShadow = 'none';
  ta.style.background = 'transparent';
  ta.style.opacity = '0';
  ta.style.pointerEvents = 'none';
  ta.style.zIndex = '-1';
  ta.setAttribute('readonly', '');
  ta.contentEditable = 'true';
  ta.readOnly = true;
  document.body.appendChild(ta);

  // iOS Safari needs the element to be in the DOM and focused
  ta.focus();
  ta.select();

  // For iOS: move cursor to end of text
  if (navigator.userAgent.match(/ipad|iphone/i)) {
    ta.setSelectionRange(0, 999999);
  } else {
    ta.select();
  }

  try {
    var ok = document.execCommand('copy');
    if (ok) {
      toast(successMsg, 'success');
    } else {
      // Last resort: select all text and show manual copy hint
      ta.style.opacity = '1';
      ta.style.width = 'auto';
      ta.style.height = 'auto';
      ta.style.left = '50%';
      ta.style.top = '50%';
      ta.style.transform = 'translate(-50%,-50%)';
      ta.style.zIndex = '99999';
      ta.style.padding = '12px';
      ta.style.background = '#fff';
      ta.style.border = '2px solid var(--blue)';
      ta.style.borderRadius = '12px';
      ta.style.fontSize = '14px';
      ta.style.textAlign = 'center';
      ta.select();
      toast('请长按文字手动复制', 'info');
      setTimeout(function() { document.body.removeChild(ta); }, 5000);
      return;
    }
  } catch(e) {
    toast('复制失败，请重试', 'error');
  }
  document.body.removeChild(ta);
}

function copyOneText(text) {
  copyToClipboard(text, '已复制: ' + text);
}

// ============================================================
// COPY ISSUE TEXT (批量)
// ============================================================
function copyIssueText() {
  const issued = clients.filter(c => c.stage === 2); issued.sort(function(a,b){ var da=a.createdAt||0; var db=b.createdAt||0; if(da!==db)return da-db; var sa=a.stageTimestamps?(a.stageTimestamps[2]||0):0; var sb=b.stageTimestamps?(b.stageTimestamps[2]||0):0; return sa-sb; });
  if (issued.length === 0) { toast('出证名单暂无客户', 'info'); return; }
  const lines = issued.map(c => {
    const d = new Date(c.createdAt);
    const date = `${d.getMonth()+1}.${d.getDate()}`;
    const licType = c.licenseType || '单个体';
    const cType = c.cardType || '一类';
    const isSelf = licType.includes('自带');
    return isSelf
      ? `${date} ${c.name} ${licType} ${cType}`
      : `${date} ${c.name} ${licType} ${cType} 已出`;
  });
  copyToClipboard(lines.join('\n'), '已复制 ' + lines.length + ' 条出证文本');
}

// EXPORT
// ============================================================
function exportData() {
  if (clients.length === 0) { toast('暂无数据可导出', 'info'); return; }
  const rows = clients.map(c => {
    const stage = STAGES.find(s => s.id === c.stage);
    return [
      c.name, c.licenseType || '', c.cardType || '', c.advanceAmount || '',
      stage ? stage.label : '', c.notes || '', formatReviewDate(c.createdAt)
    ].join(',');
  });
  const header = '姓名,执照类型,银行卡类型,预付金额,当前阶段,备注,创建时间';
  const csv = '﻿' + header + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `抖店客户数据_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('导出成功', 'success');
}

// ============================================================
// RENDER: Kanban Board
// ============================================================
function renderKanban(stageIds) {
  const board = document.getElementById('kanban');

  const filteredClients = clients.filter(c => {
    if (activeFilter !== null && c.stage !== activeFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const match = (c.name || '').toLowerCase().includes(q);
      if (!match) return false;
    }
    return true;
  });

  const columnsToRender = activeFilter !== null
    ? STAGES.filter(s => s.id === activeFilter)
    : STAGES;

  // Targeted refresh: update existing cards in-place (no DOM destruction)
  if (stageIds && stageIds.length > 0) {
    columnsToRender.forEach(function(stage) {
      if (stageIds.indexOf(stage.id) === -1) return;
      var col = board.querySelector('.column[data-stage="' + stage.id + '"]');
      if (!col) return;
      var cardsEl = col.querySelector('.column-cards');
      if (!cardsEl) return;
      var stageClients = filteredClients.filter(c => c.stage === stage.id);
      if (stage.id === 2) { stageClients.sort(function(a,b){ var da=a.createdAt||0; var db=b.createdAt||0; if(da!==db)return da-db; var sa=a.stageTimestamps?(a.stageTimestamps[2]||0):0; var sb=b.stageTimestamps?(b.stageTimestamps[2]||0):0; return sa-sb; }); }
      if (stage.id === 4) { stageClients.sort(function(a,b){ var sa = a.stageTimestamps ? (a.stageTimestamps[4] || a.createdAt || 0) : (a.createdAt || 0); var sb = b.stageTimestamps ? (b.stageTimestamps[4] || b.createdAt || 0) : (b.createdAt || 0); return sb - sa; }); }
      // Update count
      var countEl = col.querySelector('.column-count');
      if (countEl) countEl.textContent = stageClients.length;
      // Update hint / cards
      if (stageClients.length === 0) {
        cardsEl.innerHTML = '<div class="column-drop-hint">拖放客户至此</div>';
      } else {
        // Remove hint if present
        var hint = cardsEl.querySelector('.column-drop-hint');
        if (hint) hint.remove();
        // Build map of existing cards
        var existing = {};
        cardsEl.querySelectorAll('.card').forEach(function(el) {
          existing[el.getAttribute('data-client-id')] = el;
        });
        // Build new card list
        var newIds = stageClients.map(function(c) { return c.id; });
        // Remove cards no longer in column
        Object.keys(existing).forEach(function(id) {
          if (newIds.indexOf(id) === -1) { existing[id].remove(); }
        });
        // Update or insert cards in order
        var refEl = null;
        stageClients.forEach(function(c) {
          var card = cardsEl.querySelector('.card[data-client-id="' + c.id + '"]');
          if (card) {
            // Update existing card content in-place
            updateCardContent(card, c);
            // Move to correct position
            if (refEl && card.previousElementSibling !== refEl) {
              cardsEl.insertBefore(card, refEl.nextElementSibling);
            }
          } else {
            // Create new card
            var div = document.createElement('div');
            div.innerHTML = renderCard(c);
            var newCard = div.firstElementChild;
            if (refEl) {
              cardsEl.insertBefore(newCard, refEl.nextElementSibling);
            } else {
              cardsEl.insertBefore(newCard, cardsEl.firstChild);
            }
            card = newCard;
          }
          refEl = card;
        });
        
      }
    });
    return;
  }

  // Helper: update card content in-place
  function updateCardContent(card, c) {
    var nameEl = card.querySelector('.card-name');
    if (nameEl) nameEl.textContent = c.name;
    // Update tags
    var tagsHtml = [];
    if (c.licenseType) tagsHtml.push('<span class="card-tag card-tag--id">' + SVGS.doc + ' ' + escHtml(c.licenseType) + '</span>');
    if (c.cardType) tagsHtml.push('<span class="card-tag card-tag--bank">' + SVGS.card + ' ' + escHtml(c.cardType) + '</span>');
    if (c.advanceAmount && c.advanceAmount !== '0') tagsHtml.push('<span class="card-tag card-tag--note">' + SVGS.cash + ' 预支' + escHtml(c.advanceAmount) + '</span>');
    if (c.notes) tagsHtml.push('<span class="card-tag card-tag--note">' + SVGS.pen + ' ' + escHtml(c.notes.slice(0,15)) + (c.notes.length>15?'…':'') + '</span>');
    var metaEl = card.querySelector('.card-meta');
    if (tagsHtml.length > 0) {
      if (metaEl) { metaEl.innerHTML = tagsHtml.join(''); }
      else {
        metaEl = document.createElement('div'); metaEl.className = 'card-meta'; metaEl.innerHTML = tagsHtml.join('');
        var nameEl = card.querySelector('.card-name'); if (nameEl) nameEl.after(metaEl);
      }
    } else if (metaEl) { metaEl.remove(); }
    // Update copy bar
    var copyBar = card.querySelector('.card-copy-bar');
    if (c.stage === 2) {
      var cd = new Date(c.createdAt);
      var date = (cd.getMonth()+1) + '.' + cd.getDate();
      var licType = c.licenseType || '单个体';
      var cType = c.cardType || '一类';
      var isSelf = licType.includes('自带');
      var line = isSelf ? (date + ' ' + c.name + ' ' + licType + ' ' + cType) : (date + ' ' + c.name + ' ' + licType + ' ' + cType + ' 已出');
      if (copyBar) {
        var textEl = copyBar.querySelector('.card-copy-text');
        if (textEl) textEl.textContent = line;
        copyBar.setAttribute('onclick', "event.stopPropagation();copyOneText('" + escAttr(line) + "')");
      }
    }
    // Update time
    var timeEl = card.querySelector('.card-time');
    if (timeEl) timeEl.textContent = formatReviewDate(c.createdAt);
    var ownerEl = card.querySelector('.card-owner');
    if (ownerEl && c.user_id) {
      ownerEl.textContent = getNick(c.user_id);
    }
  }

  // Full rebuild
  var pageScrollY = window.scrollY || document.documentElement.scrollTop;
  var boardScroll = board.scrollLeft;
  var colScrolls = {};
  board.querySelectorAll('.column-cards').forEach(function(el) {
    var stageId = el.getAttribute('data-stage');
    if (stageId) colScrolls[stageId] = { left: el.scrollLeft, top: el.scrollTop };
  });

  board.style.opacity = '0';
  board.innerHTML = columnsToRender.map(stage => {
    const stageClients = filteredClients.filter(c => c.stage === stage.id); if (stage.id === 2) { stageClients.sort(function(a,b){ var da=a.createdAt||0; var db=b.createdAt||0; if(da!==db)return da-db; var sa=a.stageTimestamps?(a.stageTimestamps[2]||0):0; var sb=b.stageTimestamps?(b.stageTimestamps[2]||0):0; return sa-sb; }); } if (stage.id === 4) { stageClients.sort(function(a,b){ var sa = a.stageTimestamps ? (a.stageTimestamps[4] || a.createdAt || 0) : (a.createdAt || 0); var sb = b.stageTimestamps ? (b.stageTimestamps[4] || b.createdAt || 0) : (b.createdAt || 0); return sb - sa; }); }
    const copyBtn = stage.id === 2 && stageClients.length > 0 ? `
      <button class="btn btn--primary" style="height:28px;padding:0 12px;font-size:11px;gap:4px;flex-shrink:0;"
              onclick="event.stopPropagation();copyIssueText()" title="复制出证文本"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 复制</button>` : '';
    const advanceBtn = stage.id === 3 && stageClients.length > 0 ? `
      <button class="btn btn--primary" style="height:28px;padding:0 12px;font-size:11px;gap:4px;flex-shrink:0;background:var(--purple);"
              onclick="event.stopPropagation();copyAdvanceList()" title="复制预付名单">${SVGS.cash.replace('viewBox="0 0 24 24"','width="14" height="14" viewBox="0 0 24 24"')} 结算</button>` : '';
    return `
      <div class="column"
           data-stage="${stage.id}"
           ondragover="handleDragOver(event)"
           ondragleave="handleDragLeave(event)"
           ondrop="handleDrop(event)">
        <div class="column-header">
          <div class="column-header-left">
            <div class="column-icon" style="background:${stage.bg};color:${stage.color};">${stage.icon}</div>
            <div class="column-title">${stage.label}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <div class="column-count">${stageClients.length}</div>
            ${copyBtn}${advanceBtn}
          </div>
        </div>
        <div class="column-cards" data-stage="${stage.id}">
          ${stageClients.length === 0 ? `
            <div class="column-drop-hint">拖放客户至此</div>
          ` : stageClients.map(c => renderCard(c)).join('')}
        </div>
      </div>
    `;
  }).join('');

  // Restore scroll positions (synchronous, no visual jump)
  board.offsetHeight; // force reflow
  if (window._savedScrollY !== undefined) {
    window.scrollTo(0, window._savedScrollY);
    delete window._savedScrollY;
  }
  board.scrollLeft = boardScroll;
  board.style.opacity = '';
  // Show user labels on cards (admin always)
  board.querySelectorAll('.card-owner').forEach(function(el){
    var phone = el.textContent.trim();
    if (phone) { el.textContent = getNick(phone); }
  });
  Object.keys(colScrolls).forEach(function(stageId) {
    var el = board.querySelector('.column-cards[data-stage="' + stageId + '"]');
    if (el) { el.scrollLeft = colScrolls[stageId].left; el.scrollTop = colScrolls[stageId].top; }
  });
}
function getNick(phone){ if(!phone) return ''; if(window._adminUsers&&window._adminUsers.length>0&&!window._adminUsers.some(function(u){return u.phone===phone})) return '无'; return (window._nicks&&window._nicks[phone])||phone; }
function renderCard(c) {
  const stage = STAGES[c.stage];
  const tags = [];
  if (c.licenseType) tags.push(`<span class="card-tag card-tag--id">${SVGS.doc} ${escHtml(c.licenseType)}</span>`);
  if (c.cardType) tags.push(`<span class="card-tag card-tag--bank">${SVGS.card} ${escHtml(c.cardType)}</span>`);
  if (c.advanceAmount && c.advanceAmount !== '0') tags.push(`<span class="card-tag card-tag--note">${SVGS.cash} 预支${escHtml(c.advanceAmount)}</span>`);
  if (c.notes) tags.push(`<span class="card-tag card-tag--note">${SVGS.pen} ${escHtml(c.notes.slice(0,15))}${c.notes.length>15?'…':''}</span>`);

  const canGoNext = c.stage < STAGES.length - 1;
  const nextStage = canGoNext ? STAGES[c.stage + 1] : null;

  // Build copyable text for 出证名单
  let copyBar = '';
  if (c.stage === 2) {
    const cd = new Date(c.createdAt);
    const date = `${cd.getMonth()+1}.${cd.getDate()}`;
    const licType = c.licenseType || '单个体';
    const cType = c.cardType || '一类';
    const isSelf = licType.includes('自带');
    const line = isSelf
      ? `${date} ${c.name} ${licType} ${cType}`
      : `${date} ${c.name} ${licType} ${cType} 已出`;
    copyBar = `
      <div class="card-copy-bar" onclick="event.stopPropagation();copyOneText('${escAttr(line)}')" title="点击复制此行">
        <span class="card-copy-text">${escHtml(line)}</span>
        <span class="card-copy-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></span>
      </div>`;
  }


  // 已完结复制文本（按完成时间排序算套数）
  let doneCopyBar = '';
  if (c.stage === 4) {
    const doneClients = clients.filter(function(x) { return x.stage === 4; });
    doneClients.sort(function(a, b) { var sa = a.stageTimestamps ? (a.stageTimestamps[4] || a.createdAt || 0) : (a.createdAt || 0); var sb = b.stageTimestamps ? (b.stageTimestamps[4] || b.createdAt || 0) : (b.createdAt || 0); return sa - sb; });
    const rank = doneClients.findIndex(function(x) { return x.id === c.id; }) + 1;
    const m = new Date().getMonth() + 1;
    const doneLine = c.name + '完结 ' + m + '月完结' + rank + '套';
    doneCopyBar = '<div class="card-copy-bar" onclick="event.stopPropagation();copyOneText(\'' + doneLine.replace(/'/g, "\\'") + '\')" title="点击复制此行"><span class="card-copy-text">' + escHtml(doneLine) + '</span><span class="card-copy-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></span></div>';
  }
  return `
    <div class="card"
         draggable="true"
         data-client-id="${c.id}"
         ondragstart="handleDragStart(event)"
         ondragend="handleDragEnd(event)"
         onclick="handleCardClick('${c.id}')">
      <div class="card-name">${escHtml(c.name)}</div>
      ${tags.length ? `<div class="card-meta">${tags.join('')}</div>` : ''}
      ${copyBar}
      ${doneCopyBar}
      <div class="card-actions">
        <button class="card-action card-action--delete" onclick="event.stopPropagation();deleteClient('${c.id}')" title="删除">✕</button>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="card-time" style="margin-top:0;">${formatReviewDate(c.createdAt)}</div>
        <div class="card-owner">${getNick(c.user_id)}</div>
      </div>
    </div>
  `;
}

// ============================================================
// DRAG & DROP
// ============================================================
function handleDragStart(e) {
  draggedClientId = e.target.dataset.clientId;
  if (!draggedClientId) return;
  e.target.classList.add('card--dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', draggedClientId);

  // Build full-card drag ghost with Apple-polished shape
  var card = e.target;

  // Collect card data
  var nameEl = card.querySelector('.card-name');
  var clientName = nameEl ? nameEl.textContent.trim() : '';

  var tagsEl = card.querySelectorAll('.card-tag');
  var tags = [];
  tagsEl.forEach(function(t) {
    var raw = t.textContent.trim();
    var cls = 'dg-tag--blue';
    if (t.classList.contains('card-tag--bank')) cls = 'dg-tag--green';
    if (t.classList.contains('card-tag--note')) cls = 'dg-tag--orange';
    tags.push({ cls: cls, text: raw });
  });

  var copyBarEl = card.querySelector('.card-copy-text');
  var copyText = copyBarEl ? copyBarEl.textContent.trim() : '';

  var timeEl = card.querySelector('.card-time');
  var timeText = timeEl ? timeEl.textContent.trim() : '';

  // Build ghost DOM
  var ghost = document.createElement('div');
  ghost.className = 'drag-ghost';

  // Name
  var nameDiv = document.createElement('div');
  nameDiv.className = 'dg-name';
  nameDiv.textContent = clientName;
  ghost.appendChild(nameDiv);

  // Tags
  if (tags.length > 0) {
    var tagsWrap = document.createElement('div');
    tagsWrap.className = 'dg-tags';
    tags.forEach(function(t) {
      var tag = document.createElement('span');
      tag.className = 'dg-tag ' + t.cls;
      tag.textContent = t.text;
      tagsWrap.appendChild(tag);
    });
    ghost.appendChild(tagsWrap);
  }

  // Copy bar (出证/完结)
  if (copyText) {
    var copyDiv = document.createElement('div');
    copyDiv.className = 'dg-copybar';
    copyDiv.textContent = copyText;
    ghost.appendChild(copyDiv);
  }

  // Time
  if (timeText) {
    var timeDiv = document.createElement('div');
    timeDiv.className = 'dg-time';
    timeDiv.textContent = timeText;
    ghost.appendChild(timeDiv);
  }

  ghost.style.top = '-9999px';
  ghost.style.left = '-9999px';
  document.body.appendChild(ghost);

  var rect = ghost.getBoundingClientRect();
  e.dataTransfer.setDragImage(ghost, rect.width / 2, rect.height / 2);

  requestAnimationFrame(function() {
    if (ghost.parentNode) document.body.removeChild(ghost);
  });
}

function handleDragEnd(e) {
  e.target.classList.remove('card--dragging');
  document.querySelectorAll('.column--drag-over').forEach(el => el.classList.remove('column--drag-over'));
  dragHappened = true;
  setTimeout(() => { dragHappened = false; }, 0);
  draggedClientId = null;
}

function handleCardClick(clientId) {
  if (dragHappened) return;
  openEditModal(clientId);
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const column = e.target.closest('.column');
  if (column && draggedClientId) {
    column.classList.add('column--drag-over');
  }
}

function handleDragLeave(e) {
  const column = e.target.closest('.column');
  if (column) {
    // Only remove if we're actually leaving the column
    const related = e.relatedTarget;
    if (!related || !column.contains(related)) {
      column.classList.remove('column--drag-over');
    }
  }
}

function handleDrop(e) {
  e.preventDefault();
  const column = e.target.closest('.column');
  if (!column) return;
  column.classList.remove('column--drag-over');
  const stageId = parseInt(column.dataset.stage);
  const clientId = e.dataTransfer.getData('text/plain') || draggedClientId;
  if (clientId && !isNaN(stageId)) {
    moveClient(clientId, stageId);
  }
  draggedClientId = null;
}

// ============================================================
// REFRESH
// ============================================================
function refreshAll(stageIds) { renderStats(); renderKanban(stageIds); }

// ========== TRASH ==========
function loadTrash() { try { return JSON.parse(localStorage.getItem(TRASH_KEY)) || []; } catch { return []; } }
function saveTrash(arr) { try { localStorage.setItem(TRASH_KEY, JSON.stringify(arr)); } catch(e) { console.log("saveTrash localStorage error:",e.message); } }
function restoreFromTrash(clientId, silent) {
  var trash = loadTrash(); var idx = trash.findIndex(function(c) { return c.id === clientId; });
  if (idx === -1) return; var c = trash[idx]; trash.splice(idx, 1); delete c.deletedAt;
  clients.push(c); saveClients(clients); saveTrash(trash); refreshAll();
  if (!silent) toast("已恢复: " + c.name, "success");
}
function clearTrash() { localStorage.removeItem(TRASH_KEY); closeTrash(); toast("回收站已清空", "info"); }
function openTrash() {
  closeModal(); var trash = loadTrash(); var container = document.getElementById("modalContainer"); var rows = "";
  if (trash.length === 0) { rows = '<div style="text-align:center;padding:40px 20px;color:var(--text-tertiary);">回收站为空</div>'; }
  else { trash.forEach(function(c) {
    var sl = STAGES.find(function(s) { return s.id === c.stage; });
    rows += "<div style='display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;background:rgba(0,0,0,0.02);margin-bottom:6px;'>" +
      "<div><span style='font-weight:600;'>" + escHtml(c.name) + "</span>" +
      "<span style='color:var(--text-secondary);font-size:11px;margin-left:8px;'>" + (sl ? sl.label : "") + "</span></div>" +
      "<button class='btn btn--small btn--primary' onclick='restoreFromTrash(\"" + c.id + "\");closeTrash();'>恢复</button></div>";
  });}
  container.innerHTML = "<div class='modal-overlay' onclick='if(event.target===this)closeTrash()'><div class='modal'><div class='modal-header'><div class='modal-title'>回收站 (" + trash.length + ")</div>" +
    "<button class='modal-close' onclick='closeTrash()'>X</button></div><div class='modal-body' style='max-height:50vh;overflow-y:auto;'>" + rows + "</div>" +
    (trash.length > 0 ? "<div class='modal-footer' style='justify-content:space-between;'><button class='btn btn--ghost btn--small' style='color:#FF3B30;' onclick='clearTrash()'>全部清空</button><button class='btn btn--ghost btn--small' onclick='closeTrash()'>关闭</button></div>" : "<div class='modal-footer'><button class='btn btn--ghost btn--small' onclick='closeTrash()'>关闭</button></div>") + "</div></div>";
}
function closeTrash() { closeModal(); }

// ============================================================
// SEARCH
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // Search toggle
  var searchToggle = document.getElementById('searchToggle');
  if (searchToggle) {
    searchToggle.addEventListener('click', toggleSearch);
  }
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value.trim();
      refreshAll();
    });
    // Close search on blur (mobile keyboard done)
  }

});

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  // Cmd/Ctrl + K: focus search
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput')?.focus();
  }
  // Escape: close modal
  if (e.key === 'Escape') { closeModal(); } if (e.key === '?' && document.activeElement === document.body) { e.preventDefault(); toggleHelp(); }
});

// ============================================================
// INIT
// ============================================================
// Migrate old data (9-stage → 5-stage) — only run once
// Loading helpers
function showLoading() {
  var el = document.getElementById('loadingScreen');
  if (el) el.className = 'loading-screen';
}
function hideLoading() {
  var el = document.getElementById('loadingScreen');
  if (el) { el.className = 'loading-screen loading-screen--hide'; setTimeout(function() { if (el) el.style.display = 'none'; }, 400); }
}

// Show loading immediately
showLoading();
// Hide after a minimum display time
setTimeout(function() { if (!window._loaded) { window._minLoadDone = true; } }, 600);

document.getElementById("lw_btn").addEventListener("click",handleLogin);
document.getElementById("lw_pass").addEventListener("keydown",function(e){if(e.key==="Enter")handleLogin();});
// Floating labels
document.querySelectorAll('.lw-field input').forEach(function(inp){ inp.addEventListener('input',function(){ this.parentElement.classList.toggle('has-value',this.value.length>0); }); });
if(currentUser){showApp();}else{document.getElementById("appShell").style.display="none";}

// Init — pull from cloud if logged in
if (currentUser) {
  showLoading();
  // Check if admin
  fetch(SB_URL + '/rest/v1/users?phone=eq.' + currentUser, { headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } }).then(function(r) { return r.json(); }).then(function(ud) {
    isAdmin = !!(ud[0] && ud[0].role === 'admin');
    localStorage.setItem('dou_admin', isAdmin ? '1' : '');
    if (isAdmin) document.body.classList.add('is-admin');
    if (isAdmin) {
      return fetch(SB_URL+'/rest/v1/users?select=phone,nickname',{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}}).then(function(r2){return r2.json();}).then(function(nu){
        window._nicks={};window._adminUsers=[];
        (nu||[]).forEach(function(x){window._adminUsers.push({phone:x.phone,label:x.nickname||x.phone});window._nicks[x.phone]=x.nickname||x.phone;});
        var dv2 = localStorage.getItem('dou_view');
        window._viewingUser = (dv2 === 'all') ? null : (dv2 || currentUser);
      });
    }
  }).then(function() {
    return syncToCloud();
  }).then(function() {
    var dv = localStorage.getItem('dou_view');
    if (isAdmin && dv === 'all') return fetch(SB_URL+'/rest/v1/clients?select=*',{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}}).then(function(r){return r.json();});
    if (isAdmin && dv && dv !== currentUser) return fetch(SB_URL+'/rest/v1/clients?user_id=eq.'+dv+'&select=*',{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}}).then(function(r){return r.json();});
    return sbFetch('clients', 'GET');
  }).then(function(data) {
    if (data.length > 0) { clients = data.map(mapClient); localStorage.setItem(STORAGE_KEY, JSON.stringify(clients)); }
  }).catch(function(err) { console.log("Init error:", err); toast("加载失败，请检查网络连接","error"); }).finally(function() { hideLoading(); refreshAll(); if(isAdmin)initAdminSelect(); });
} else {
  setTimeout(function() { hideLoading(); }, 400);
  refreshAll();
}

const MIGRATED_KEY = 'doudian_migrated_v4';
if (!localStorage.getItem(MIGRATED_KEY)) {
  clients.forEach(c => {
    const old = c.stage;
    if (old === 0) c.stage = 0;
    else if (old <= 2) c.stage = 1;
    else if (old <= 5) c.stage = 2;
    else if (old <= 7) c.stage = 3;
    else c.stage = 4;
  });
  saveClients(clients);
  localStorage.setItem(MIGRATED_KEY, '1');
}
</script>
